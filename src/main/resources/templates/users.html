<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
<div sec:authorize="isAuthenticated()">
    <h1>Logged as <b><span sec:authentication="name"></span></b></h1>

    <form th:action="@{/logout}"
          method="post"
          style="display: inline; margin-left: 10px;">
        <input type="hidden"
        th:name="${_csrf.parameterName}"
        th:value="${_csrf.token}">
        <button type="submit">Logout</button>
    </form>
</div>
<h1>Users</h1>

<table border="1">
    <thead>
    <tr>
        <td>ID</td>
        <td>Name</td>
        <td>Last name</td>
        <td>Email</td>
        <td>Action</td>
    </tr>
    </thead>

    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.firstName}"></td>
        <td th:text="${user.lastName}"></td>
        <td th:text="${user.email}"></td>
        <td>

            <span sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/admin/users/edit}" method="get" style="display: inline;">
                <input type="hidden" name="id" th:value="${user.id}">
                <button type="submit">Edit</button>
            </form>
            <form th:action="@{/admin/users/delete}" method="post">
                <input type="hidden" name="id" th:value="${user.id}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" >Delete</button>
            </form>
            </span>

        </td>
    </tr>
    </tbody>
</table>

<br><br>

<div sec:authorize="hasRole('ADMIN')">
    <p><a th:href="@{/admin/users/add}" style="font-size: 2em">Add user</a></p>
</div>


</body>
</html>
