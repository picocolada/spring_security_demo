<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Add user</title>
    <style>
        <style>
        .error {
            color: red;
            font-size: 14px;
            display: block;
            margin-top: 5px;
        }
        form {
            max-width: 500px;
            margin: 20px auto;
        }
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .form-group label {
            width: 120px;
            flex-shrink: 0;
        }
        .form-group input {
            width: 250px;
            padding: 5px;
            flex-shrink: 0;
        }
        .form-group input[readonly] {
            background-color: #f5f5f5;
        }
        .buttons {
            margin-top: 15px;
        }
        .buttons button {
            padding: 5px 15px;
        }
        .buttons a {
            margin-left: 10px;
        }
    </style>
</head>
<body>

<h1>Add user</h1>

<div sec:authorize="isAuthenticated()">
    <h1>Logged as <b><span sec:authentication="name"></span></b></h1>

    <form th:action="@{/logout}"
          method="post"
          style="display: inline; margin-left: 10px;">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
        <button type="submit">Logout</button>
    </form>
</div>

<form th:action="@{/admin/users/add}" method="post" th:object="${user}">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

    <div th:if="${#fields.hasErrors('*')}">
        <ul>
            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
        </ul>
    </div>

    <div class="form-group">
        <label>Username:</label>
        <input type="text" th:field="*{username}" required>
    </div>
    <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="error"></span>

    <div class="form-group">
        <label>Name:</label>
        <input type="text" th:field="*{firstName}" required>
    </div>
    <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}" class="error"></span>

    <div class="form-group">
        <label>Last name:</label>
        <input type="text" th:field="*{lastName}" required>
    </div>
    <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}" class="error"></span>

    <div class="form-group">
        <label>Email:</label>
        <input type="email" th:field="*{email}" required>
    </div>
    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" th:field="*{password}" required>
    </div>
    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error"></span>

    <div class="buttons">
        <button type="submit">Save</button>
        <a th:href="@{/admin/users}">Discard changes</a>
    </div>
</form>

</body>
</html>
